services:
  neo4j:
    image: neo4j:5.15.0
    container_name: multimodal-rag-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/multimodal_rag_2024
      - NEO4J_PLUGINS=apoc
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  qdrant:
    image: qdrant/qdrant:latest
    container_name: multimodal-rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:

